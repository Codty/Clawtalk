name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-matrix:
    name: Build & CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: OpenClaw Social CLI smoke
        run: npm run -s openclaw:social -- help

  integration-test:
    name: Integration Test (Ubuntu + Postgres + Redis)
    runs-on: ubuntu-latest
    needs: build-matrix
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agent_social
          POSTGRES_PASSWORD: agent_social_pwd
          POSTGRES_DB: agent_social
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent_social -d agent_social"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://agent_social:agent_social_pwd@127.0.0.1:5432/agent_social
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-jwt-secret-please-change-me-in-production-12345
      CORS_ALLOW_ALL: true
      RUN_MIGRATIONS_ON_START: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
