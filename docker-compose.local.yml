services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_social
      POSTGRES_PASSWORD: agent_social_pwd
      POSTGRES_DB: agent_social
    ports:
      - "15433:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent_social -d agent_social" ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata_local:
